version: 2

builds:
  - binary: hark
    goos: [darwin]
    goarch: [arm64, amd64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X github.com/shlyk/hark/cmd.version={{.Version}}

archives:
  - formats: [tar.gz]

# Homebrew tap intentionally omitted: pushing a formula to a separate
# homebrew-tap repo requires a PAT secret; `go install` and the release
# binaries cover distribution for now.

changelog:
  sort: asc
  filters:
    exclude: ["^docs"]
